<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chat with Alex — Agent Assist Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0f172a;font-family:Georgia,serif;color:#f1f5f9;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:600px;margin:0 auto}
#header{background:#1e293b;border-bottom:1px solid #334155;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#avatar{width:42px;height:42px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
#info{flex:1}
#aname{font-size:15px;font-weight:900;color:#f1f5f9}
#status{font-size:12px;color:#22c55e}
#back{background:#334155;border:none;border-radius:8px;padding:8px 14px;color:#94a3b8;font-size:12px;cursor:pointer;font-family:Georgia,serif;text-decoration:none;display:inline-block}
#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.msg{max-width:82%;font-size:14px;line-height:1.6;padding:12px 14px;word-wrap:break-word;white-space:pre-wrap}
.bot{background:#1e293b;border:1px solid #334155;color:#f1f5f9;align-self:flex-start;border-radius:4px 14px 14px 14px}
.usr{background:linear-gradient(135deg,#1d4ed8,#7c3aed);color:#fff;align-self:flex-end;border-radius:14px 4px 14px 14px}
#form-area{background:#1e293b;border:1px solid #f59e0b44;margin:8px 16px;border-radius:12px;padding:14px;display:none}
#form-area.show{display:block}
.ft{font-size:10px;color:#f59e0b;letter-spacing:2px;font-family:monospace;margin-bottom:10px;font-weight:bold}
#form-area input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#f1f5f9;font-size:14px;font-family:Georgia,serif;margin-bottom:8px;display:block;-webkit-appearance:none;outline:none}
#form-area button{width:100%;background:linear-gradient(90deg,#f59e0b,#ef4444);color:#0f172a;border:none;border-radius:8px;padding:12px;font-weight:900;font-size:15px;cursor:pointer;font-family:Georgia,serif}
#input-area{padding:12px 16px;background:#0f172a;border-top:1px solid #1e293b;display:flex;gap:10px;flex-shrink:0}
#txt{flex:1;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 14px;color:#f1f5f9;font-size:14px;font-family:Georgia,serif;outline:none;-webkit-appearance:none;resize:none}
#snd{background:linear-gradient(90deg,#f59e0b,#ef4444);color:#0f172a;border:none;border-radius:10px;padding:12px 18px;font-weight:900;font-size:14px;cursor:pointer;font-family:Georgia,serif;white-space:nowrap}
#snd:disabled{background:#334155;color:#475569}
#footer{text-align:center;padding:8px;font-size:10px;color:#334155;letter-spacing:1px;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="avatar">⚡</div>
    <div id="info">
      <div id="aname">Alex — Agent Assist Pro</div>
      <div id="status">● Online now</div>
    </div>
    <a href="/" id="back">← Back</a>
  </div>
  <div id="msgs"></div>
  <div id="form-area">
    <div class="ft">📋 YOUR DETAILS</div>
    <input id="f1" placeholder="Full name *" type="text">
    <input id="f2" placeholder="Company name" type="text">
    <input id="f3" placeholder="Email address *" type="email">
    <input id="f4" placeholder="Phone number" type="tel">
    <input id="f5" placeholder="Best time to call" type="text">
    <button onclick="submitLead()">Submit Details →</button>
  </div>
  <div id="input-area">
    <input id="txt" placeholder="Type your message..." type="text">
    <button id="snd" onclick="send()">Send</button>
  </div>
  <div id="footer">AGENT ASSIST PRO · AI SALES AGENT</div>
</div>

<script>
var state={},collecting=false,done=false;

var ROI={
  small:{a:'25',l:'£6,000/yr',s:'£18,000–£35,000',r:'3x–6x',p:'4 months'},
  medium:{a:'50',l:'£12,000/yr',s:'£35,000–£70,000',r:'3x–6x',p:'4 months'},
  large:{a:'100–200',l:'£21,000–£36,000/yr',s:'£70,000–£280,000',r:'4x–8x',p:'3 months'},
  enterprise:{a:'200+',l:'POA',s:'£300,000+',r:'7x–10x',p:'under 2 months'}
};

var EDITIONS={
  'energy':'our Energy & Gas Edition','gas':'our Energy & Gas Edition',
  'telecoms':'our Telecoms B2B Edition','telecom':'our Telecoms B2B Edition',
  'insurance':'our Insurance Edition','estate':'our Estate Agency Edition',
  'property':'our Estate Agency Edition','banking':'our Banking Edition',
  'bank':'our Banking Edition','life':'our Life Insurance Edition',
  'life insurance':'our Life Insurance Edition'
};

var OBJECTIONS={
  scripts:'Training tells agents what to do. Agent Assist Pro shows them exactly what to say — on a live call, with this customer, in this mood, right now. The difference in outcomes is measurable.',
  budget:'This is not a cost — it is a saving. The licence pays for itself within the first quarter. The question is not whether you can afford it — it is whether you can afford not to have it.',
  it:'Zero IT involvement required. It is entirely browser-based. Your agents open a web browser and they are using it. No installation, no integration, no IT tickets.',
  build:'Typically takes 6–12 months and £80,000–£150,000 to build internally. Agent Assist Pro is available today, fully built and sector-specific.',
  evidence:'That is exactly why we offer a free 30-day pilot. You choose 10–50 agents and measure the results yourself. If it does not move the needle — you have lost nothing.',
  expensive:'Based on your team size the projected annual saving significantly exceeds the licence cost. ROI is typically 3x–8x with payback under 4 months.'
};

function detectSector(t){
  var sectors=['energy','gas','telecoms','telecom','insurance','estate','property','banking','bank','life insurance','life'];
  t=t.toLowerCase();
  for(var i=0;i<sectors.length;i++){if(t.indexOf(sectors[i])>=0)return sectors[i];}
  return null;
}

function detectSize(t){
  var n=t.match(/[0-9]+/);
  if(n){var v=parseInt(n[0]);if(v<=25)return'small';if(v<=100)return'medium';if(v<=200)return'large';return'enterprise';}
  t=t.toLowerCase();
  if(t.indexOf('small')>=0||t.indexOf('few')>=0)return'small';
  if(t.indexOf('medium')>=0)return'medium';
  if(t.indexOf('large')>=0||t.indexOf('enterprise')>=0)return'enterprise';
  return null;
}

function detectObj(t){
  t=t.toLowerCase();
  if(t.indexOf('already have')>=0||t.indexOf('have scripts')>=0||t.indexOf('trained')>=0)return'scripts';
  if(t.indexOf('budget')>=0||t.indexOf('afford')>=0||t.indexOf('expensive')>=0||t.indexOf('how much')>=0||t.indexOf('cost')>=0)return'budget';
  if((t.indexOf('it ')>=0||t.indexOf('i.t')>=0)&&(t.indexOf('team')>=0||t.indexOf('department')>=0||t.indexOf('install')>=0||t.indexOf('integrat')>=0))return'it';
  if(t.indexOf('build')>=0&&(t.indexOf('ourselves')>=0||t.indexOf('in house')>=0||t.indexOf('in-house')>=0))return'build';
  if(t.indexOf('evidence')>=0||t.indexOf('proof')>=0||t.indexOf('results')>=0||t.indexOf('prove')>=0)return'evidence';
  return null;
}

function getResponse(text){
  var sector=detectSector(text),size=detectSize(text),obj=detectObj(text),t=text.toLowerCase();
  if(sector&&!state.sector){
    state.sector=sector;
    var ed=EDITIONS[sector]||'a sector-specific edition';
    if(!state.size)return'We have '+ed+' specifically — one of six sector editions in the platform.\n\nHow many agents do you have in your call centre?';
  }
  if(size&&!state.size){
    state.size=size;
    var r=ROI[size];
    var ed2=state.sector?(EDITIONS[state.sector]||'our sector edition'):'the relevant sector edition';
    if(!state.pitched){
      state.pitched=true;
      return'Based on a team of '+r.a+' agents, here is what Agent Assist Pro delivers:\n\n• Annual licence: '+r.l+'\n• Projected annual saving: '+r.s+'\n• Return on investment: '+r.r+'\n• Payback period: '+r.p+'\n\nYou would have access to '+ed2+' — 432 professional scripts across 36 scenarios, mood-adaptive, zero IT required.\n\nWould a 20-minute demonstration be worth your time?';
    }
  }
  if(obj)return OBJECTIONS[obj];
  if((t.indexOf('yes')>=0||t.indexOf('interested')>=0||t.indexOf('demo')>=0||t.indexOf('sounds good')>=0||t.indexOf('tell me more')>=0)&&!state.asked){
    state.asked=true;
    return'I would like to arrange a 20-minute demonstration for you — no commitment required.\n\nCould I take your contact details so we can schedule a time that suits you?';
  }
  if(t.indexOf('hello')>=0||t.indexOf('hi')>=0||t.match(/^hey/))return'Good day. To make sure I give you the most relevant information — what sector does your call centre operate in?';
  if(state.sector&&!state.size)return'How many agents do you have in your call centre?';
  if(state.size&&!state.sector)return'Which sector does your call centre operate in — energy, telecoms, insurance, banking, estate agency, or life insurance?';
  if(state.pitched&&!state.asked){state.asked=true;return'I would like to arrange a demonstration so you can see the platform working with your sector specifically. It takes 20 minutes and requires no commitment.\n\nCould I take your contact details?';}
  if(!state.sector)return'To give you the most relevant information — what sector does your call centre operate in?';
  if(!state.size)return'How many agents do you currently have in your team?';
  return'What is your biggest challenge in the call centre right now — handling difficult calls, reducing costs, or improving retention?';
}

function addMsg(text,type){
  var m=document.getElementById('msgs');
  var d=document.createElement('div');
  d.className='msg '+type;
  d.textContent=text;
  m.appendChild(d);
  m.scrollTop=m.scrollHeight;
}

function showForm(){
  document.getElementById('form-area').className='show';
  document.getElementById('input-area').style.display='none';
  var m=document.getElementById('msgs');
  m.scrollTop=m.scrollHeight;
}

function submitLead(){
  var n=document.getElementById('f1').value;
  var e=document.getElementById('f3').value;
  if(!n||!e){alert('Please enter your name and email.');return;}
  var c=document.getElementById('f2').value;
  var p=document.getElementById('f4').value;
  var tm=document.getElementById('f5').value;
  var lead={name:n,company:c,email:e,phone:p,time:tm,sector:state.sector||'Unknown',timestamp:new Date().toISOString()};
  try{var leads=JSON.parse(localStorage.getItem('aap_leads')||'[]');leads.push(lead);localStorage.setItem('aap_leads',JSON.stringify(leads));}catch(ex){}
  document.getElementById('form-area').className='';
  done=true;
  document.getElementById('snd').disabled=true;
  addMsg('Thank you '+n+'. Your details have been passed to our team at Agent Assist Pro.\n\nYou can expect a call'+(tm?' '+tm:' within 24 hours')+' to arrange your demonstration.\n\nWe look forward to speaking with you'+(c?' from '+c:'')+'.','bot');
}

function send(){
  if(done)return;
  var inp=document.getElementById('txt');
  var text=inp.value.trim();
  if(!text)return;
  inp.value='';
  addMsg(text,'usr');
  document.getElementById('snd').disabled=true;
  setTimeout(function(){
    var resp=getResponse(text);
    addMsg(resp,'bot');
    if(state.asked&&!collecting&&!done){
      collecting=true;
      setTimeout(showForm,500);
    }
    document.getElementById('snd').disabled=false;
  },600);
}

document.getElementById('txt').addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();send();}
});

// Welcome message
setTimeout(function(){
  addMsg('Good day. I am Alex from Agent Assist Pro.\n\nWe have built an AI Script Generation Engine — the first platform purpose-built to give call centre agents the exact right words, for the exact right customer, in the exact right moment.\n\nTo make sure I give you the most relevant information — what sector does your call centre operate in?','bot');
},400);
</script>
</body>
</html>
